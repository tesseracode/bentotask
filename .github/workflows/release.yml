name: Release

on:
  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
  # Auto trigger on version tags
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build web UI
        run: cd web && npm run build

      - name: Copy web build to embed directory
        run: |
          rm -rf internal/api/static
          cp -r web/build internal/api/static

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist

          for PAIR in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            GOOS=${PAIR%/*}
            GOARCH=${PAIR#*/}
            EXT=""
            if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
            echo "Building bt-${GOOS}-${GOARCH}${EXT}"
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags "-X github.com/tesserabox/bentotask/internal/cli.version=${VERSION}" \
              -o "dist/bt-${GOOS}-${GOARCH}${EXT}" ./cmd/bt/
          done

      - name: Generate checksums
        run: cd dist && sha256sum bt-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bt-*
            dist/checksums.txt
          generate_release_notes: true
